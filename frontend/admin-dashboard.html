<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="admin-dashboard.html" class="navbar-brand">Admin Console</a>
    <div class="nav-links">
      <button onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container">
    <h2>Pending & Action Requests</h2>
    <div class="card table-responsive">
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Operation</th>
            <th>Resource Title</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="adminRequestsTable"></tbody>
      </table>
    </div>

    <h2>Registered Users</h2>
    <div class="card table-responsive">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Joined Date</th>
          </tr>
        </thead>
        <tbody id="usersTable"></tbody>
      </table>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
