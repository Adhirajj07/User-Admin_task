<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="card auth-card">
    <h2>Reset Password</h2>
    <p style="margin-bottom: 1rem; color: var(--text-muted);">Enter your email to receive a password reset link.</p>
    <div id="alert" class="alert hidden"></div>
    <form id="forgotForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" required>
      </div>
      <button type="submit" class="btn" style="width: 100%;">Send Reset Link</button>
    </form>
    <p style="margin-top: 1rem;"><a href="login.html">Back to Login</a></p>
  </div>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
